id: ansible_ssh_delete_test_import
namespace: test222

tasks:
  - id: ansible_task
    type: io.kestra.plugin.ansible.cli.AnsibleCLI
    docker:
      image: cytopia/ansible:latest-tools
      pullPolicy: IF_NOT_PRESENT
      user: "root"
    namespaceFiles:
      enabled: true
    beforeCommands:
      - pip install -r ansible/requirements.txt > /dev/null
    inputFiles:
      inventory.ini: |
        TARGET_IP
      myplaybook.yml: |
        ---
        - hosts: TARGET_IP
      id_rsa: "{{ secret('SSH_KEY') }}"
    commands:
      - ansible-playbook ansible/playbooks/delete_hosts.yaml -i ansible/hosts
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_REMOTE_USER: "admin"

